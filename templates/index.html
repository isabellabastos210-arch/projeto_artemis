<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Missão Artemis</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            text-align: center;
        }

        header {
            background: #111827;
            padding: 20px;
        }

        .logo {
            width: 150px;
        }

        .container {
            width: 85%;
            margin: auto;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Artemis_program_logo.svg">
    <h1>Missão Artemis</h1>
</header>

<div class="container">

    <h2>Retorno da humanidade à Lua</h2>

    <p>
        O programa Artemis da NASA tem como objetivo levar novamente humanos à Lua
        e preparar futuras missões para Marte.
    </p>

    <div class="gallery">

    <div class="gallery-item">
        <img src="static/imagens/artemis-2-astronauts.jpg" alt="Astronautas da Artemis 2">
    </div>

    <div class="gallery-item">
        <img src="static/imagens/nasa-orion-artemiss-II-terra-lua-espaco-14.webp" alt="Nave Orion no espaço">
    </div>

    <div class="gallery-item">
        <img src="static/imagens/nave-estelar-na-superfície-da-lua-com-o-fundo-do-planeta-terra-missão-espacial-artemis-elementos-desta-imagem-fornecidos-por-307252969.webp" alt="Nave na Lua com a Terra ao fundo">
    </div>

    <div class="gallery-item">
        <img src="static/imagens/a5b85eb9-f745-4f2b-883b-68b80c2ddaa0.avif" alt="Detalhes da Missão Artemis">
    </div>

    <div class="gallery-item">
        <img src="static/imagens/hftx7poxcaaks3g.avif" alt="Tecnologia Artemis">
    </div>

</div>

</body>
</html>
